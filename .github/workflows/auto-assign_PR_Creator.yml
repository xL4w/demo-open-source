name: Auto Assign PR Creator

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'staging'
      - 'master'
      - 'aws-dev'      

permissions:  
  contents: read
  pull-requests: write

jobs:
  auto-assign-creator:  # Job to assign the PR creator
    runs-on: ubuntu-latest
    steps:
      - name: Clear Cache
        uses: actions/cache@v4.3.0 # v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-             

      - name: Harden Runner
        uses: step-security/harden-runner@v2.10.1 # v2.8.1
        with:
          egress-policy: audit

      - name: Assign PR Creator
        uses: actions/github-script@v7.0.1 # v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [context.actor] 
            });
