name: Auto Assign PR Creator

on:
  # Trigger when a pull request is opened or reopened
  pull_request:
    types: [opened, reopened, ready_for_review] 
  # Trigger when a pull request's target branch changes
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:  
  contents: read
  pull-requests: write

jobs:
  auto-assign-creator:  # Job to assign the PR creator
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Clear Cache
        uses: actions/cache@v4.0.2
        with:
          path: |
            ./.github/workflows/
          key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-workflow-${{ github.event_name }}-          

      - name: Assign PR Creator
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number;
            const creator = context.payload.pull_request.user.login;

            github.rest.issues.addAssignees({
                issue_number: pull_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [creator]
            });
