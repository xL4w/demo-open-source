name: Auto Assign PR Reviewers

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'staging'
      - 'master'    

permissions:
  contents: read
  pull-requests: write
 

jobs:
  auto-assign-reviewers:  # Job to assign reviewers based on PR type
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Auto Assign Reviewers
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
              github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ['GTCrais', 'CTLLaw']
              });
