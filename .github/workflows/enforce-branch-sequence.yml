name: Enforce Branch Sequence and Permissions

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'master'
      - 'staging'      
      - 'aws-dev'      

  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce_branch_sequence:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Enforce Branch Sequence
        run: |
          source ./scripts/common_functions.sh
          enforce_branch_sequence "$GITHUB_BASE_REF" "$GITHUB_HEAD_REF"
        env:
          ALLOWED_REVIEWERS: "GTCrais,CTLLaw"
