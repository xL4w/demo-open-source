name: Branch Protection

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'master'
      - 'staging'
      - 'aws-dev'
  push:
    branches:
      - 'master'
      - 'staging'
      - 'aws-dev'

  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write      

jobs:
  # Job to enforce branch protection rules
  enforce-branch-protection:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request_target' || github.event_name == 'push' }}

    steps:
      - name: Clear Cache
        uses: actions/cache@v4.1.1 # v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-

      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.1 # v2.8.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4.2.1 # v4.1.7

      - name: Enforce branch protection
        run: |
          # Prevent direct pushes to protected branches
          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "Direct pushes to 'master' branch are not allowed. Please create a Pull Request to 'aws-dev' instead."
            exit 1
          elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
            echo "Direct pushes to 'staging' branch are not allowed. Please create a Pull Request to 'aws-dev' instead."
            exit 1
          fi

  # Job to print PR sequence for PR creator
  print-pr-sequence:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request_target' }}
    needs: [] # No dependencies
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1 # v4.1.7

      - name: Print PR sequence
        run: |
          # Get the PR's base and head branches
          base_branch=$(echo "${{ github.event.pull_request.base.ref }}" | awk '{print $NF}')
          head_branch=$(echo "${{ github.event.pull_request.head.ref }}" | awk '{print $NF}')

          # Get the PR creator's username
          pr_creator=$(echo "${{ github.event.pull_request.user.login }}" | awk '{print $NF}')

          # Determine the PR sequence
          if [[ "$base_branch" == "aws-dev" ]]; then
            echo "@"$pr_creator" 👉 PR sequence:  $head_branch -> aws-dev"
            echo "✔️ This is a valid sequence."
          elif [[ "$base_branch" == "staging" && "$head_branch" == "aws-dev" ]]; then
            echo "@"$pr_creator" 👉 PR sequence: aws-dev -> staging"
            echo "✔️ This is a valid sequence."
          elif [[ "$base_branch" == "master" && "$head_branch" == "staging" ]]; then
            echo "@"$pr_creator" 👉 PR sequence: staging -> master"
            echo "✔️ This is a valid sequence."
          else
            echo "@"$pr_creator" ❌ Invalid PR sequence:  $head_branch -> $base_branch"
            echo "Please follow the correct sequence: aws-dev -> staging -> master"
            echo "To fix this, you can either:\n\n1. **Rebase your branch** onto the correct target branch before creating the PR.\n2. **Update your PR** to target the correct branch."
          fi

  # Job to manage PRs
  manage-pull-requests:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1 # v4.1.7

      - name: Enforce initial PR target
        run: |
          # Get target branch
          target_branch="${{ github.event.pull_request.base.ref }}"

          # Check if the initial PR target is 'aws-dev'
          if [[ "$target_branch" != "aws-dev" ]]; then
            echo "⚠️ Invalid Pull Request target: '$target_branch'."
            echo "All Pull Requests must initially target the 'aws-dev' branch."
            exit 1
          fi

      - name: Auto-assign reviewers
        uses: actions/github-script@v7.0.1 # v7.0.1
        with:
          script: |
            github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['GTCrais', 'CTLLaw']
            });

      - name: Restrict PR creation and merging
        uses: actions/github-script@v7.0.1 # v7.0.1
        with:
          script: |
            const allowedUsers = ['GTCrais', 'CTLLaw'];
            const user = context.actor;
            const baseBranch = context.payload.pull_request.base.ref;
            const headBranch = context.payload.pull_request.head.ref;

            // Allow merges from any branch into aws-dev
            if (baseBranch === 'aws-dev') {
              return; // No further checks needed for initial PRs to aws-dev
            }

            // Restrict PR creation to staging and master to allowed users
            if ((baseBranch === 'staging' || baseBranch === 'master') && !allowedUsers.includes(user)) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${user}, you are not allowed to create Pull Requests to this branch. Only ${allowedUsers.join(', ')} can.`
              });
              // Don't close the PR, just comment and wait for the user to fix it
              // github.rest.pulls.update({
              //   owner: context.repo.owner,
              //   repo: context.repo.repo,
              //   pull_number: context.issue.number,
              //   state: 'closed'
              // });
            }

            // Restrict merging to allowed users
            if (context.payload.action === 'closed' && context.payload.pull_request.merged && !allowedUsers.includes(user)) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${user}, you are not allowed to merge Pull Requests. Only ${allowedUsers.join(', ')} can.`
              });
              // Don't reopen the PR
              // github.rest.pulls.update({
              //   owner: context.repo.owner,
              //   repo: context.repo.repo,
              //   pull_number: context.issue.number,
              //   state: 'open'
              // });
            }

      - name: Print PR sequence (again for further validation)
        run: |
          # Get the PR's base and head branches
          base_branch=$(echo "${{ github.event.pull_request.base.ref }}" | awk '{print $NF}')
          head_branch=$(echo "${{ github.event.pull_request.head.ref }}" | awk '{print $NF}')

          # Get the PR creator's username
          pr_creator=$(echo "${{ github.event.pull_request.user.login }}" | awk '{print $NF}')

          # Determine the PR sequence
          if [[ "$base_branch" == "aws-dev" ]]; then
            echo "@"$pr_creator" 👉 PR sequence:  $head_branch -> aws-dev"
            echo "✔️ This is a valid sequence."
          elif [[ "$base_branch" == "staging" && "$head_branch" == "aws-dev" ]]; then
            echo "@"$pr_creator" 👉 PR sequence: aws-dev -> staging"
            echo "✔️ This is a valid sequence."
          elif [[ "$base_branch" == "master" && "$head_branch" == "staging" ]]; then
            echo "@"$pr_creator" 👉 PR sequence: staging -> master"
            echo "✔️ This is a valid sequence."
          else
            echo "@"$pr_creator" ❌ Invalid PR sequence:  $head_branch -> $base_branch"
            echo "Please follow the correct sequence: aws-dev -> staging -> master"
            echo "To fix this, you can either:\n\n1. **Rebase your branch** onto the correct target branch before creating the PR.\n2. **Update your PR** to target the correct branch."
          fi
