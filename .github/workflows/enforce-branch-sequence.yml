name: Enforce Branch Sequence

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:  
  contents: read
  pull-requests: write

jobs:
  check_branch_sequence:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Clear Cache
        uses: actions/cache@v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-                

      - name: Enforce Branch Sequence
        run: |
          # Get source and target branches
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
     
          # Define allowed transitions
          if [[ "$TARGET_BRANCH" == "aws-dev" ]]; then
           # Any branch is allowed to merge into aws-dev
           echo "Branch sequence is valid."
          elif [[ "$TARGET_BRANCH" == "staging" && "$SOURCE_BRANCH" == "aws-dev" ]]; then
            echo "Branch sequence is valid."
          elif [[ "$TARGET_BRANCH" == "master" && "$SOURCE_BRANCH" == "staging" ]]; then
            echo "Branch sequence is valid."
          else
            echo "Error: Invalid branch sequence. PRs can only be made from:"
            echo "  * Any branch to 'aws-dev'"
            echo "  * 'aws-dev' to 'staging'"
            echo "  * 'staging' to 'master'"
            exit 1 
          fi
          