name: GitHub Guardian

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'master'
      - 'staging'
      - 'aws-dev'

jobs:
  # Job to enforce branch protection rules
  enforce-branch-protection:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Clear Cache
        uses: actions/cache@v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-             
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0 # v2.8.0
        with:
          egress-policy: audit      
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Enforce branch protection
        run: |
          # Prevent direct pushes to protected branches
          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "Direct pushes to 'master' branch are not allowed. Please create a Pull Request instead."
            exit 1
          elif [[ "$GITHUB_REF" == "refs/heads/staging" ]]; then
            echo "Direct pushes to 'staging' branch are not allowed. Please create a Pull Request instead."
            exit 1
          elif [[ "$GITHUB_REF" == "refs/heads/aws-dev" ]]; then
            echo "Direct pushes to 'aws-dev' branch are not allowed. Please create a Pull Request instead."
            exit 1
          fi

  # Job to manage PRs
  manage-pull-requests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Enforce PR sequence
        run: |
          # Get source and target branches
          source_branch="${{ github.event.pull_request.head.ref }}"
          target_branch="${{ github.event.pull_request.base.ref }}"

          # Allowed PR sequences
          if [[ "$source_branch" == "aws-dev" && "$target_branch" == "staging" ]]; then
            echo "Pull Request from 'aws-dev' to 'staging' is allowed."
          elif [[ "$source_branch" == "staging" && "$target_branch" == "master" ]]; then
            echo "Pull Request from 'staging' to 'master' is allowed."
          else
            echo "Invalid Pull Request sequence: '$source_branch' to '$target_branch'. Only 'aws-dev' -> 'staging' -> 'master' is allowed."
            exit 1
          fi

      - name: Auto-assign reviewers
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['GTCrais', 'CTLLaw']
            });

      - name: Restrict PR creation and merging
        uses: actions/github-script@v6
        with:
          script: |
            const allowedUsers = ['GTCrais', 'CTLLaw'];
            const user = context.actor;
            const baseBranch = context.payload.pull_request.base.ref;

            // Allow merges from any branch into aws-dev
            if (baseBranch === 'aws-dev') {
              return; // No further checks needed for initial PRs to aws-dev
            }

            // Restrict PR creation to staging and master to allowed users
            if ((baseBranch === 'staging' || baseBranch === 'master') && !allowedUsers.includes(user)) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${user}, you are not allowed to create Pull Requests to this branch. Only ${allowedUsers.join(', ')} can.`
              });
              github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                state: 'closed'
              });
            }

            // Restrict merging to allowed users
            if (context.payload.action === 'closed' && context.payload.pull_request.merged && !allowedUsers.includes(user)) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${user}, you are not allowed to merge Pull Requests. Only ${allowedUsers.join(', ')} can.`
              });
              // Reopen the PR (optional)
              // github.rest.pulls.update({
              //   owner: context.repo.owner,
              //   repo: context.repo.repo,
              //   pull_number: context.issue.number,
              //   state: 'open'
              // });
            }
