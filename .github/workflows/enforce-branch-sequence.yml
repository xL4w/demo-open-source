name: GitHub Guardian

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'master'
      - 'staging'
      - 'aws-dev'

  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce_branch_sequence:
    runs-on: ubuntu-latest
    steps:
      
      - name: Clear Cache
        uses: actions/cache@v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-             

      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0 # v2.8.0
        with:
          egress-policy: audit

      - name: Check Branch Sequence
        uses: actions/github-script@v7.0.1 # v7.0.1
        with:
          script: |
            const headBranch = context.payload.pull_request.head.ref;
            const baseBranch = context.payload.pull_request.base.ref;
            const allowedTransitions = [
              ['aws-dev', 'staging'],
              ['staging', 'master']
            ];

            // Allow merges from any branch into aws-dev
            if (baseBranch === 'aws-dev') {
              return; // No further checks needed for initial PRs to aws-dev
            }

            const isValidTransition = allowedTransitions.some(
              ([source, target]) => headBranch === source && baseBranch === target
            );

            if (!isValidTransition) {
              const errorMessage = "Branch Protection Rule: This pull request violates our branching workflow. Changes must flow through specific stages:\n\n" +
                                  "1. New features are developed in separate feature branches (like \"" + headBranch + "\").\n" +
                                  "2. Feature branches are merged into the \"aws-dev\" branch for initial testing.\n" +
                                  "3. Once tested, changes in \"aws-dev\" are merged into the \"staging\" branch for further integration and user acceptance testing.\n" +
                                  "4. Finally, approved changes in \"staging\" are merged into the \"master\" branch for production deployment.\n\n" +
                                  "Please update your pull request to follow this workflow.";
              core.setFailed(errorMessage);
            }
