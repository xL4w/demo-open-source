name: Enforce Branch Sequence

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  check_branch_sequence:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Check Branch Sequence
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const headBranch = context.payload.pull_request.head.ref;
            const baseBranch = context.payload.pull_request.base.ref;
            const allowedTransitions = [
              ['aws-dev', 'staging'],
              ['staging', 'master']
            ];

            const isValidTransition = allowedTransitions.some(
              ([source, target]) => headBranch === source && baseBranch === target
            );

            if (!isValidTransition) {
              throw new Error(
                `Invalid branch transition: Pull requests are only allowed from aws-dev to staging and from staging to master.`
              );
            }