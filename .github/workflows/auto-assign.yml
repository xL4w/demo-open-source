name: Auto Assign PR Creator and Reviewers

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_target:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/auto-assign.yml'
      - '.github/PULL_REQUEST_TEMPLATE/pull_request_template.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  auto_assign_reviewers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6

      - name: Set PR Template Output
        id: set_template
        run: |
          echo "::set-output name=template::$(cat .github/PULL_REQUEST_TEMPLATE/pull_request_template.md)"

      - name: Parse PR Template
        id: parse_template
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const template = await github.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/PULL_REQUEST_TEMPLATE/pull_request_template.md'
            });
            const parsedData = extractPRType(template.data.content);  // Replace with your function
            core.setOutput('parsedData', JSON.stringify(parsedData));

      - name: Auto Assign Reviewers
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number;
            const body = context.payload.pull_request.body || "";
            const template = github.context.outputs.template || "";
            const baseRef = context.payload.pull_request.base.ref;
            const creator = context.payload.pull_request.user.login;
            const reviewers = [];

            const isApplicationsPR = body.toLowerCase().includes("[x] **applications**") || template.toLowerCase().includes("[x] **applications**");
            const isInfrastructurePR = body.toLowerCase().includes("[x] **infrastructure**") || template.toLowerCase().includes("[x] **infrastructure**");

            const additionalReviewerForApplications = isApplicationsPR ? "additionalReviewerForApplications" : "";
            const additionalReviewerForInfrastructure = isInfrastructurePR ? "additionalReviewerForInfrastructure" : "";
            const reviewersToAdd = {
              "GTCrais": isApplicationsPR,
              "mbsimonovic": isInfrastructurePR,
              [creator]: isInfrastructurePR && !body.toLowerCase().includes("[x] **infrastructure**"),
              "CTLLaw": baseRef === "master"
            };

            Object.entries(reviewersToAdd).forEach(([reviewer, shouldAdd]) => {
              if (shouldAdd) {
                reviewers.push(reviewer);
              }
            });

            if (reviewers.length > 0) {
              github.rest.pulls.requestReviewers({
                pull_number: pull_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                reviewers: reviewers,
              });
            }

  auto_assign_creator:
    needs: auto_assign_reviewers
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR Creator
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number;
            const creator = context.payload.pull_request.user.login;
            const { data: { assignees } } = await github.rest.issues.get({
                issue_number: pull_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
            });

            if (!assignees.map(assignee => assignee.login).includes(creator)) {
                github.rest.issues.addAssignees({
                    issue_number: pull_number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    assignees: [creator]
                });
            }

  add_annotations:
    runs-on: ubuntu-latest
    steps:
      - name: Parse PR Template
        id: parse_template
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const template = await github.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/PULL_REQUEST_TEMPLATE/pull_request_template.md'
            });
            const parsedData = extractPRType(template.data.content);
            core.setOutput('parsedData', JSON.stringify(parsedData));

      - name: Add Annotations
        if: ${{ steps.parse_template.outputs.success }}
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const parsedData = JSON.parse(core.getOutput('parsedData'));
            const pull_number = context.payload.pull_request.number;
            const { data: { assignees } } = await github.rest.issues.get({
              issue_number: pull_number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            let annotations = [];
            if (!parsedData.prType) {
              annotations.push({
                path: "",
                body: "**Please specify the PR type (Applications or Infrastructure) in the template.**",
                annotation_level: "warning"
              });
            }

            if (annotations.length > 0) {
              console.log("Adding annotations:", annotations);
              // Use github.rest.issues.createComment to add annotations to the PR
              // (implementation details omitted for brevity)
            }
