name: Auto Assign PR Creator and Reviewers

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-assign-reviewers:  # Assign reviewers based on PR type
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0 # Updated to latest version
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4.1.6 # Updated to latest version

      - name: Auto Assign Reviewers
        uses: actions/github-script@v7.0.1  # Updated to latest version
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number;
            const body = context.payload.pull_request.body;
            const baseRef = context.payload.pull_request.base.ref;
            const assignees = [];

            // Check for PR type (Application or Infrastructure)
            const isApplicationPR = body.includes("Applications");
            const isInfrastructurePR = body.includes("Infrastructure");

            // Assign reviewers based on PR type and target branch
            if (isApplicationPR && baseRef !== 'master') {
              assignees.push("GTCrais");
            } else if (isInfrastructurePR && baseRef !== 'master') {
              assignees.push("mbsimonovic");
            }

            if (baseRef === "master") {
              assignees.push("CTLLaw"); 
            }

            // Assign the reviewers
            if (assignees.length > 0) {
              github.rest.issues.addAssignees({
                issue_number: pull_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: assignees,
              });
            }

  auto-assign-creator:  # Assign PR creator (only if not already a reviewer)
    needs: auto-assign-reviewers
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0 # Updated to latest version
        with:
          egress-policy: audit

      - name: Assign PR Creator
        uses: actions/github-script@v7.0.1  # Updated to latest version
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number;
            const creator = context.payload.pull_request.user.login;
            const { data: { assignees } } = await github.rest.issues.get({
                issue_number: pull_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
            });

            // Ensure the PR creator is not assigned already
            if (!assignees.map(assignee => assignee.login).includes(creator)) {
                github.rest.issues.addAssignees({
                    issue_number: pull_number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    assignees: [creator]
                });
            }
