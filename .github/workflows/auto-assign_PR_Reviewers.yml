name: Auto Assign PR Reviewers

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'staging'
      - 'master'

jobs:
  auto-assign-reviewers:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Clear Cache
        uses: actions/cache@v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-                              
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit      
      - name: Check if Reviewers Already Assigned
        id: check-reviewers
        uses: actions/github-script@v7.0.1
        with:
          script: |
            try {
              const { data: pullRequest } = await github.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              console.log("Pull Request Data:", pullRequest);
              const requestedReviewers = pullRequest.requested_reviewers.map(reviewer => reviewer.login);
              const result = requestedReviewers.length > 0 ? JSON.stringify(requestedReviewers) : null;
              console.log(`Current reviewers: ${result}`);
              return result;
            } catch (error) {
              console.error("Error fetching pull request data:", error);
              return null; 
            }
          result-encoding: json

      - name: Auto Assign Reviewers (if needed)
        if: ${{ success() && (fromJSON(steps.check-reviewers.outputs.result) == 'null') }}
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const reviewersToAdd = ['GTCrais', 'CTLLaw'];
            await github.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: reviewersToAdd
            });
            console.log(`Reviewers ${reviewersToAdd.join(', ')} successfully assigned.`);
