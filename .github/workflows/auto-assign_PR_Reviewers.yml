name: Auto Assign PR Reviewers

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - 'staging'
      - 'master'    

permissions:
  contents: read
  pull-requests: write
 

jobs:
  auto-assign-reviewers:  # Job to assign reviewers based on PR type
    runs-on: ubuntu-latest
    steps:
      - name: Clear Cache
        uses: actions/cache@v4.0.2 # v4.0.2
        with:
         path: |
           ./.github/workflows/
         key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
         restore-keys: |
           ${{ runner.os }}-workflow-${{ github.event_name }}-

      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Auto Assign Reviewers
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
              github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ['GTCrais', 'CTLLaw']
              });
