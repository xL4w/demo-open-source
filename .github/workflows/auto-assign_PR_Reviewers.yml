name: Auto Assign PR Reviewers

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  
jobs:
  auto_assign_reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0
        with:
          egress-policy: audit

      - name: Auto Assign Reviewers
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number;
            const body = context.payload.pull_request.body || ""; 
            const baseRef = context.payload.pull_request.base.ref;
            const assignees = [];

            // Check for PR type (Application or Infrastructure)
            const isApplicationsPR = body.toLowerCase().includes("applications");
            const isInfrastructurePR = body.toLowerCase().includes("infrastructure");

            // Assign reviewers based on PR type and target branch
            if (isApplicationsPR) {
              assignees.push("GTCrais");
            }

            if (isInfrastructurePR) {
              assignees.push("mbsimonovic");
            }

            if (baseRef === "master") {
              assignees.push("CTLLaw"); 
            }

            // Assign the reviewers
            if (assignees.length > 0) {
              github.rest.issues.addAssignees({
                issue_number: pull_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: assignees,
              });
            }
