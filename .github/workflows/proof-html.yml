name: Proof HTML
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.10.1 # v2.8.1
        with:
          egress-policy: audit

      - uses: anishathalye/proof-html@v2.1.3 # v2.1.3
        with:
          directory: ./
