name: Block Changes to .github Directory

on:
  pull_request_target:
    types: [assigned, unassigned, labeled, unlabeled, opened, edited, closed, reopened, synchronize, converted_to_draft, ready_for_review, locked, unlocked, review_requested, review_request_removed, auto_merge_enabled, auto_merge_disabled]
    branches:
      - 'main'    
      - 'master'
      - 'staging'
      - 'aws-dev'
  push:
    branches:
      - 'main'     
      - 'master'
      - 'staging'
      - 'aws-dev'
  pull_request_review:
    types: [submitted]
  
permissions:
  contents: read
  pull-requests: write

jobs:
  block-changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request_target' && github.event.action != 'closed' }}
    steps:
      - name: Clear Cache
        uses: actions/cache@v4.3.0
        with:
          path: |
            ./.github/workflows/
          key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-workflow-${{ github.event_name }}-

      - name: Harden Runner
        uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
                  
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Check for changes to .github
        run: |
          if git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -q "^\.github/"; then
            echo "Pull requests that change the .github directory are not allowed."
            echo "You may explicitly allow changes to the .github directory by including 'Allow .github changes' in your commit message."
            exit 1
          fi
