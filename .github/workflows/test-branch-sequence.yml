name: Test Branch Sequence and Permissions

on:
  push:
    branches:
      - main
      - master
      - aws-dev
      - staging
  pull_request:
    branches:
      - main
      - master
      - aws-dev
      - staging
  pull_request_review:
  pull_request_target:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}  # Set the GH_TOKEN environment variable

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Clear Cache
        uses: actions/cache@v2
        with:
          path: |
            ./.github/workflows/
          key: ${{ runner.os }}-workflow-${{ github.event_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-workflow-${{ github.event_name }}-

  test-branch-sequence:
    runs-on: ubuntu-latest
    needs: clear-cache
    steps:
      - name: Run Common Steps
        uses: ./.github/workflows/common-steps.yml
        with:
          working-directory: ${{ github.workspace }}

      - name: Run Branch Sequence Tests
        run: |
          set -e  # Enable exit on error
          ./.github/workflows/scripts/enforce-branch-sequence-test.sh || echo "Branch sequence tests failed."

  test-case-07:
    runs-on: ubuntu-latest
    needs: clear-cache
    steps:
      - name: Run Test Case 07
        uses: ./.github/workflows/common-steps.yml
        with:
          working-directory: ${{ github.workspace }}

      - name: Run Test Case 07
        run: |
          set -e  # Enable exit on error
          ./.github/workflows/scripts/07-pr-creation-gtcrais.sh || echo "Test case 07 failed."

  test-case-08:
    runs-on: ubuntu-latest
    needs: clear-cache
    steps:
      - name: Run Test Case 08
        uses: ./.github/workflows/common-steps.yml
        with:
          working-directory: ${{ github.workspace }}

      - name: Run Test Case 08
        run: |
          set -e  # Enable exit on error
          ./.github/workflows/scripts/08-pr-creation-ctllaw.sh || echo "Test case 08 failed."

  test-reviewer-permissions:
    runs-on: ubuntu-latest
    needs: clear-cache
    env:  
      PR_CREATOR: automation-bot # Use the same user for all PR creation tests
      INVALID_REVIEWER: "4k4xs4pH1r3-2"  # Replace with an invalid reviewer name

    steps:
      - name: Run Test Cases
        uses: ./.github/workflows/common-steps.yml
        with:
          working-directory: ${{ github.workspace }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run Test Cases
        run: |
          set -e  # Enable exit on error
          ./.github/workflows/scripts/09-add-invalid-reviewer.sh || echo "Test case 09 failed."
          ./.github/workflows/scripts/10-approval-merge-permissions.sh || echo "Test case 10 failed."
