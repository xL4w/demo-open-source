name: Snyk Infrastructure as Code Scan

on:
  pull_request:
    branches: ['aws-dev']

permissions:
  contents: read

jobs:
  test-snyk:
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      actions: read
      # security-events: write  # Commented out as it requires GitHub Advanced Security

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.8.0 # v2.8.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4.1.6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Snyk Scan
        id: snyk_scan
        uses: snyk/actions@b98d498629f1c368650224d6d212bf7dfa89e4bf # v0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test --sarif-file-output=snyk.sarif 
          args: --all-projects # --severity-threshold=high 
          
      # Commented out steps that require GitHub Advanced Security.
      # - name: Upload SARIF file
      #   uses: github/codeql-action/upload-sarif@v3.25.8 # v3.25.8
      #   with:
      #     sarif_file: snyk.sarif
      #     checkout_path: '.' 
      #     token: ${{ secrets.GH_TOKEN }}

      - name: Print Snyk Scan Results
        if: always()  # Ensure this step runs even if previous steps fail.
        run: |
          echo "Snyk Scan Results:"
          cat snyk.sarif  # Output the results to the console.
