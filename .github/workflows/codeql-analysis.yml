name: "CodeQL"

on:
  push:
    branches: [ "aws-dev" ]  # The workflow runs on push events to the "aws-dev" branch.
  pull_request:
    branches: [ "aws-dev" ]  # The workflow runs on pull request events targeting the "aws-dev" branch.
  schedule:
    - cron: '15 1 * * 5'  # The workflow runs on a schedule, at 1:15 AM UTC every Friday.

permissions:
  contents: read  # The workflow has read access to repository contents.
  # security-events: write  # Commented out as it requires GitHub Advanced Security.

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      # security-events: write  # Commented out as it requires GitHub Advanced Security.

    strategy:
      fail-fast: false  # Continue all matrix jobs even if one fails.
      matrix:
        language: [ 'java', 'javascript', 'python' ]  # The languages to analyze.

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2.8.0
      with:
        egress-policy: audit  # Harden the runner with egress policy audit.

    - name: Checkout repository
      uses: actions/checkout@v4.1.6  # Checkout the repository code.

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3.25.8
      with:
        languages: ${{ matrix.language }}  # Initialize CodeQL for the specified languages.

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3.25.8  # Automatically build the project.

    # Uncomment and modify the following lines if autobuild fails and manual build steps are needed.
    # - run: |
    #     echo "Run, Build Application using script"
    #     ./location_of_script_within_repo/buildscript.sh

    - name: Perform CodeQL Analysis
      id: analyze
      uses: github/codeql-action/analyze@v3.25.8
      with:
        category: "/language:${{matrix.language}}"  # Perform CodeQL analysis.

    - name: Print CodeQL Analysis Results
      if: always()  # Ensure this step runs even if previous steps fail.
      run: |
        echo "CodeQL Analysis Results:"
        cat ${{ steps.analyze.outputs.result }}  # Output the results to the console.
